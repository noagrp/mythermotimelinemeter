<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Box</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: sans-serif; }
        #wall { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; transition: all 0.5s ease; }
        
        .tv-box { position: relative; background: #111; border-radius: 16px; overflow: hidden; border: 2px solid transparent; transition: all 0.5s ease; display: flex; flex-direction: column; cursor: pointer; }
        .tv-box.expanded { grid-column: span 2; grid-row: span 2; transform: scale(1.02); z-index: 500; }
        .tv-box.expanded iframe { height: 500px; }
        
        .drag-handle { padding: 10px; cursor: grab; background: rgba(255,255,255,0.05); text-align: center; font-size: 12px; color: #888; }
        .drag-handle:active { cursor: grabbing; }
        
        iframe { width: 100%; height: 250px; border: none; transition: height 0.5s; }
        .tv-title { padding: 15px; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div id="wall"></div>

    <script>
        let videos = [];
        let dragSrcEl = null;

        async function loadVideos() {
            try {
                const response = await fetch('videos.json');
                videos = await response.json();
                render();
            } catch (err) {
                console.error("Error loading videos:", err);
            }
        }

        function render() {
            const wall = document.getElementById('wall');
            wall.innerHTML = '';
            
            videos.forEach((v, index) => {
                const div = document.createElement('div');
                div.className = 'tv-box';
                div.style.borderColor = v.color;
                
                div.innerHTML = `
                    <div class="drag-handle" draggable="true">:: Drag Here ::</div>
                    <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
                    <div class="tv-title">${v.title}</div>
                `;
                
                // Expand effect
                div.addEventListener('click', (e) => {
                    if (e.target.tagName === 'IFRAME') return;
                    const isExpanded = div.classList.contains('expanded');
                    document.querySelectorAll('.tv-box').forEach(el => el.classList.remove('expanded'));
                    if (!isExpanded) div.classList.add('expanded');
                });

                // Drag and Drop
                const handle = div.querySelector('.drag-handle');
                handle.addEventListener('dragstart', (e) => { dragSrcEl = index; });
                div.addEventListener('dragover', (e) => { e.preventDefault(); });
                div.addEventListener('drop', (e) => {
                    const temp = videos[dragSrcEl];
                    videos[dragSrcEl] = videos[index];
                    videos[index] = temp;
                    render();
                });

                wall.appendChild(div);
            });
        }

        loadVideos();
    </script>
</body>
</html>
